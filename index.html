<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Sabar Digital - V3.0 DEEP_SEA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .content { pointer-events: auto; }
        .glass-ui { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .scanline { width: 100%; height: 2px; background: rgba(0, 255, 255, 0.05); position: absolute; animation: scan 4s linear infinite; z-index: 5; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>
    <div id="aquarium-container"></div>
    <div class="overlay flex flex-col p-8">
        <div class="scanline"></div>
        <header class="flex justify-between items-start content">
            <div class="glass-ui p-6 rounded-2xl border-l-4 border-blue-500">
                <h1 class="text-3xl font-black text-white tracking-tighter uppercase italic">SABAR DIGITAL <span class="text-blue-400 text-xs">V3.0 DEEP_SEA</span></h1>
                <p class="text-[10px] text-blue-300 font-mono tracking-[0.4em] mt-1 font-bold">CORE_AUDIT_INFRASTRUCTURE</p>
            </div>
            <div class="glass-ui p-4 rounded-xl text-right">
                <p class="text-[10px] text-slate-400">SESSION_TOKEN</p>
                <p class="text-xs text-green-400 font-mono">SBR-8892-X-2026</p>
            </div>
        </header>
        <main class="mt-auto grid grid-cols-1 md:grid-cols-3 gap-6 content">
            <div class="glass-ui p-8 rounded-3xl col-span-2 border-l-2 border-blue-500">
                <div class="flex justify-between mb-8">
                    <h2 class="text-xs font-bold uppercase tracking-widest text-blue-400 italic">Audit Universel en cours...</h2>
                    <span class="text-4xl font-black text-white italic" id="score-val">85<span class="text-xs opacity-50">/100</span></span>
                </div>
                <div class="flex gap-4 mb-6">
                    <input type="text" id="target" placeholder="URL CIBLE..." class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-xs font-mono text-blue-200 focus:outline-none focus:border-blue-500">
                    <button onclick="simulateAudit()" class="bg-blue-600 hover:bg-blue-400 text-white font-black px-8 py-3 rounded-xl text-[10px] uppercase transition-all shadow-lg active:scale-95">Analyser</button>
                </div>
                <div id="console" class="h-24 overflow-y-auto font-mono text-[10px] text-blue-300/60 leading-tight">
                    > INITIALIZING NEURAL SCAN...<br>> STANDBY_MODE_ACTIVE
                </div>
            </div>
            <div class="glass-ui p-8 rounded-3xl border-l-2 border-green-500 flex flex-col justify-between">
                <div>
                    <p class="text-[10px] font-bold text-slate-500 mb-6 uppercase tracking-widest">Domination_Status</p>
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><span class="text-xs text-slate-300">SHIELD</span><span class="text-green-400 text-xs font-bold">100%</span></div>
                        <div class="flex justify-between items-center"><span class="text-xs text-slate-300">RECOVERY</span><span class="text-blue-400 text-xs font-bold">ACTIVE</span></div>
                    </div>
                </div>
                <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden mt-4">
                    <div id="p-bar" class="bg-blue-500 h-full w-4/5 animate-pulse transition-all duration-1000"></div>
                </div>
            </div>
        </main>
    </div>
    <script>
        let scene, camera, renderer, particles;
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('aquarium-container').appendChild(renderer.domElement);
            const geo = new THREE.BufferGeometry();
            const pos = [];
            for (let i = 0; i < 8000; i++) pos.push((Math.random() - 0.5) * 15, (Math.random() - 0.5) * 15, (Math.random() - 0.5) * 15);
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            particles = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00d4ff, size: 0.02, transparent: true, opacity: 0.5 }));
            scene.add(particles);
            animate();
        }
        function animate() { requestAnimationFrame(animate); particles.rotation.y += 0.0006; renderer.render(scene, camera); }
        
        async function simulateAudit() {
            const consoleLog = document.getElementById('console');
            const target = document.getElementById('target').value || "ANONYMOUS_TARGET";
            consoleLog.innerHTML += `<br>> DĂ‰PLOIEMENT DU SCAN SUR ${target}...`;
            try {
                const response = await fetch('http://127.0.0.1:5000/audit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texte: target })
                });
                const data = await response.json();
                document.getElementById('score-val').innerHTML = `${data.score_optimisation}<span class="text-xs opacity-50">/100</span>`;
                consoleLog.innerHTML += `<br>> [í´±] IA DEEP_SEA : OPTIMISATION TERMINĂ‰E.`;
            } catch (e) {
                consoleLog.innerHTML += `<br>> ERREUR : SERVEUR IA DECONNECTĂ‰.`;
            }
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        init3D();
    </script>
</body>
</html>
